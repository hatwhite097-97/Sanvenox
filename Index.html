<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanexno Anonymous Portal</title>
    <!-- FontAwesome kwa ajili ya Icon Halisi (ikiwemo WhatsApp yenye rangi halisi) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== RESET & BASE STYLE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap');

        :root {
            --sanex-primary: #00f0ff;
            --sanex-glow: rgba(0, 240, 255, 0.4);
            --sanex-dark: #0a1628;
            --grey-primary: #c0c0c0;
            --grey-glow: rgba(192, 192, 192, 0.3);
            --grey-dark: #1a1a2e;
            --bg-dark: #05080f;
            --accent-purple: #7b2ff7;
            --accent-red: #ff0040;
            --text-light: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== LOADING SCREEN ===== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .loader-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            animation: spin 1.5s linear infinite;
        }

        .loader-ring:nth-child(1) {
            border-top-color: var(--sanex-primary);
            animation-duration: 1.5s;
        }

        .loader-ring:nth-child(2) {
            border-top-color: var(--grey-primary);
            animation-duration: 2s;
            animation-direction: reverse;
            width: 75%;
            height: 75%;
            top: 12.5%;
            left: 12.5%;
        }

        .loader-ring:nth-child(3) {
            border-top-color: var(--accent-purple);
            animation-duration: 1.2s;
            width: 50%;
            height: 50%;
            top: 25%;
            left: 25%;
        }

        .loader-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--sanex-primary);
            text-shadow: 0 0 20px var(--sanex-glow);
            animation: pulse-text 1.5s ease-in-out infinite;
            text-align: center;
        }

        .loader-center span {
            display: block;
            font-size: 10px;
            color: var(--grey-primary);
            margin-top: 5px;
            letter-spacing: 3px;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--sanex-primary), transparent);
            animation: scan 2s ease-in-out infinite;
            top: 0;
        }

        .loading-text {
            margin-top: 30px;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--grey-primary);
            opacity: 0.7;
        }

        .loading-bar {
            margin-top: 15px;
            width: 300px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--sanex-primary), var(--accent-purple), var(--grey-primary));
            border-radius: 3px;
            animation: fill-bar 3s ease-in-out forwards;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes fill-bar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ===== MAIN SITE LAYOUT ===== */
        #main-site {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #main-site.visible {
            display: block;
            opacity: 1;
        }

        /* ===== TOP NAV WITH HAMBURGER ===== */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 30px;
            background: rgba(5, 8, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-trigger {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            transition: 0.3s;
            border-radius: 5px;
            padding: 8px;
            border: 1px solid transparent;
        }

        .menu-trigger:hover {
            border-color: var(--sanex-primary);
            box-shadow: 0 0 10px var(--sanex-glow);
        }

        .menu-trigger span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--sanex-primary);
            transition: 0.3s;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--sanex-primary), var(--accent-purple), var(--grey-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo-sub {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--grey-primary);
            opacity: 0.6;
            display: block;
            font-family: 'Rajdhani', sans-serif;
            -webkit-text-fill-color: var(--grey-primary);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: 0.3s;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--sanex-primary);
            text-shadow: 0 0 15px var(--sanex-glow);
            background: rgba(0, 240, 255, 0.05);
        }

        .auth-btn {
            border: 1px solid var(--sanex-primary);
            color: var(--sanex-primary) !important;
            padding: 5px 14px !important;
            border-radius: 25px !important;
            font-weight: 600 !important;
            transition: 0.3s !important;
            font-size: 12px !important;
        }

        .auth-btn:hover {
            background: var(--sanex-primary) !important;
            color: var(--bg-dark) !important;
            box-shadow: 0 0 25px var(--sanex-glow);
        }

        /* ===== SIDEBAR MENU ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: linear-gradient(180deg, rgba(10, 22, 40, 0.98), rgba(5, 8, 15, 0.98));
            border-right: 1px solid var(--sanex-primary);
            z-index: 10001;
            transition: left 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 80px 20px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar.active {
            left: 0;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.2);
        }

        .sidebar-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--accent-red);
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar-close:hover {
            transform: scale(1.2);
            text-shadow: 0 0 10px var(--accent-red);
        }

        .sidebar-menu-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }

        .sidebar-item i {
            width: 25px;
            text-align: center;
        }

        .sidebar-item:hover {
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.3);
            color: var(--sanex-primary);
            transform: translateX(5px);
            text-shadow: 0 0 10px var(--sanex-glow);
        }

        .sidebar-item.active {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--sanex-primary);
            color: var(--sanex-primary);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* ===== SYSTEM BROADCAST BANNER ===== */
        .broadcast-banner {
            background: linear-gradient(90deg, var(--accent-red), var(--accent-purple));
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            font-family: 'Orbitron', monospace;
            position: relative;
            z-index: 999;
            margin-top: 60px;
            display: none;
            box-shadow: 0 4px 15px rgba(255, 0, 64, 0.3);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding-top: 60px;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 240, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(192, 192, 192, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            text-align: center;
            z-index: 2;
        }

        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--sanex-primary), #fff, var(--grey-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow-pulse 3s ease-in-out infinite;
        }

        .hero-sub {
            font-size: 1.3rem;
            letter-spacing: 12px;
            color: var(--grey-primary);
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .hero-btn {
            padding: 15px 50px;
            border: 2px solid var(--sanex-primary);
            background: transparent;
            color: var(--sanex-primary);
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.4s;
            text-decoration: none;
            display: inline-block;
        }

        .hero-btn:hover {
            background: var(--sanex-primary);
            color: var(--bg-dark);
            box-shadow: 0 0 50px var(--sanex-glow);
            transform: scale(1.05);
        }

        /* ===== DUAL SECTION ===== */
        .dual-section {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        .side {
            flex: 1;
            padding: 100px 40px 50px;
            min-height: 100vh;
            position: relative;
        }

        .side-sanex {
            background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
            border-right: 1px solid rgba(0, 240, 255, 0.2);
        }

        .side-sanex::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at top, rgba(0, 240, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .side-grey {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            border-left: 1px solid rgba(192, 192, 192, 0.2);
        }

        .side-grey::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at top, rgba(192, 192, 192, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .side-header {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .side-sanex .side-header {
            color: var(--sanex-primary);
            text-shadow: 0 0 30px var(--sanex-glow);
        }

        .side-grey .side-header {
            color: var(--grey-primary);
            text-shadow: 0 0 30px var(--grey-glow);
        }

        .side-desc {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        /* ===== CARDS / SECTIONS ===== */
        .section-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .section-card:hover {
            border-color: var(--sanex-primary);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.05);
        }

        .side-grey .section-card:hover {
            border-color: var(--grey-primary);
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.05);
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 2px;
        }

        .card-title .icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 16px;
        }

        .side-sanex .card-title .icon {
            background: rgba(0, 240, 255, 0.1);
            color: var(--sanex-primary);
        }

        .side-grey .card-title .icon {
            background: rgba(192, 192, 192, 0.1);
            color: var(--grey-primary);
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn i {
            font-size: 16px;
        }

        .btn-sanex {
            background: var(--sanex-primary);
            color: var(--bg-dark);
        }

        .btn-sanex:hover {
            box-shadow: 0 0 30px var(--sanex-glow);
            transform: translateY(-2px);
        }

        .btn-grey {
            background: var(--grey-primary);
            color: var(--bg-dark);
        }

        .btn-grey:hover {
            box-shadow: 0 0 30px var(--grey-glow);
            transform: translateY(-2px);
        }

        .btn-purple {
            background: var(--accent-purple);
            color: white;
        }

        .btn-purple:hover {
            box-shadow: 0 0 30px rgba(123, 47, 247, 0.4);
            transform: translateY(-2px);
        }

        /* ===== LOCK STATE STYLING FOR TOOLS ===== */
        .empty-tools {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-tools i {
            font-size: 36px;
            color: var(--accent-purple);
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(123, 47, 247, 0.3);
        }

        /* ===== POSTS DISPLAY ===== */
        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }

        .post-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 18px;
            transition: 0.3s;
            cursor: pointer;
        }

        .post-item:hover {
            border-color: var(--sanex-primary);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 15px rgb
